name: glaucoma-watch CI

on:
  push:
    branches: [main]
    paths:
      - "scripts/watch/**"
      - ".github/workflows/watcher-ci.yml"
  pull_request:
    paths:
      - "scripts/watch/**"
      - ".github/workflows/watcher-ci.yml"

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install glaucoma-watch with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "scripts/watch[test]"

      - name: Run pytest
        env:
          RETINA_WATCH_DISABLE_ROBOTS: "1"
          RETINA_WATCH_MIN_INTERVAL_SECONDS: "0"
        run: |
          cd scripts/watch
          python -m pytest -q

  watchlist-bootstrap-smoke:
    name: watchlist bootstrap smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install glaucoma-watch
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e scripts/watch

      - name: Init DB and regenerate watchlist
        run: |
          glaucoma-watch init-db
          glaucoma-watch bootstrap-watchlist --dry-run
