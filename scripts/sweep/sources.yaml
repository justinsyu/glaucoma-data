# Glaucoma Data Archive: per-company sweep configuration.
#
# The sweep code is generic. Company-specific knowledge lives here and should
# remain focused on glaucoma, ocular hypertension, and disease-modifying
# glaucoma source records.

defaults:
  user_agent: "glaucoma-data-archive-sweep/0.1"
  timeout_seconds: 60
  download_timeout_seconds: 120
  retry_attempts: 3
  retry_backoff_seconds: [2, 5, 15]
  playwright_headless: true
  pubmed_api_key: ""
  pubmed_tool_name: "glaucoma-data-archive-sweep"
  pubmed_email: ""

companies:
  - id: alcon
    name: "Alcon"
    folder: "companies/alcon"
    tier: 3
    sources:
      - url: "https://www.alcon.com/media-releases"
        discovery_only: true
        dest_worklist: "companies/alcon/_worklist_pending.md"
        title_filter: "(?i)Rhopressa|Rocklatan|Hydrus|AR-17043|PG043|PG324|netarsudil|glaucoma|ocular hypertension"

